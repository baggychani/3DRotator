<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>GichanImage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="left-rail">
        <section class="panel intro">
          <label class="brand-wordmark" for="imageInput" title="이미지 업로드" aria-label="GichanImage, 이미지 업로드">
            <span class="brand-wordmark__gichan">Gichan</span><span class="brand-wordmark__image">Image</span>
          </label>
          <input id="imageInput" class="visually-hidden" type="file" accept="image/*" />
          <p id="imageStatus" class="image-status" aria-live="polite"></p>
          <div class="side-actions">
            <button id="downloadButton" type="button">PNG 다운로드</button>
            <button id="resetAllButton" type="button" class="secondary">설정 초기화</button>
          </div>
        </section>
        <a class="credit-link" href="https://github.com/baggychani/3DRotator" target="_blank" rel="noreferrer">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0.2a7.8 7.8 0 0 0-2.47 15.2c0.39 0.07 0.53-0.17 0.53-0.37v-1.35c-2.17 0.47-2.63-0.92-2.63-0.92-0.35-0.9-0.87-1.14-0.87-1.14-0.71-0.49 0.05-0.48 0.05-0.48 0.79 0.05 1.2 0.81 1.2 0.81 0.7 1.19 1.83 0.85 2.28 0.65 0.07-0.5 0.27-0.85 0.5-1.04-1.73-0.2-3.55-0.86-3.55-3.86 0-0.85 0.31-1.55 0.81-2.1-0.08-0.2-0.35-0.99 0.08-2.07 0 0 0.66-0.21 2.15 0.8A7.5 7.5 0 0 1 8 4.08c0.66 0 1.32 0.09 1.94 0.26 1.49-1.01 2.15-0.8 2.15-0.8 0.43 1.08 0.16 1.87 0.08 2.07 0.5 0.55 0.8 1.25 0.8 2.1 0 3-1.82 3.66-3.56 3.85 0.28 0.24 0.53 0.72 0.53 1.45v2.02c0 0.2 0.14 0.44 0.54 0.37A7.8 7.8 0 0 0 8 0.2Z" />
          </svg>
          <span>@baggychani</span>
        </a>
      </aside>

      <section id="stageCard" class="stage-card" data-preview-theme="light">
        <button
          id="previewThemeButton"
          class="preview-theme-button"
          type="button"
          aria-label="미리보기 배경 바꾸기"
          title="미리보기 배경 바꾸기"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="stage-card__viewport">
          <canvas id="canvas" width="2160" height="3840" aria-label="미리보기"></canvas>
        </div>
      </section>

      <section class="panel controls" aria-label="편집 옵션">
        <h2>프리셋</h2>
        <nav class="mobile-control-tabs" aria-label="편집 섹션">
          <button type="button" data-mobile-tab="presets" aria-pressed="false">프리셋</button>
          <button type="button" data-mobile-tab="transform" aria-pressed="true">회전</button>
          <button type="button" data-mobile-tab="shadow" aria-pressed="false">그림자</button>
          <button type="button" data-mobile-tab="tail" aria-pressed="false">말풍선</button>
        </nav>
        <div class="preset-panel" data-mobile-panel="presets" data-mobile-active="false">
          <label>프리셋 선택 <select id="presetSelect"></select></label>
          <div class="button-row">
            <button id="savePresetButton" type="button">현재 설정 저장</button>
            <button id="deletePresetButton" type="button" class="secondary">삭제</button>
          </div>
          <div class="button-row preset-sync-actions">
            <button id="exportPresetsButton" type="button" class="secondary">프리셋 내보내기</button>
            <button id="importPresetsButton" type="button" class="secondary">프리셋 불러오기</button>
            <input id="presetImportInput" type="file" accept="application/json,.json" hidden />
          </div>
        </div>

        <details class="control-group" data-mobile-panel="transform" data-mobile-active="true" open>
          <summary>3D 회전</summary>
          <button id="resetTransformButton" type="button" class="secondary slim section-reset">3D 회전 기본값</button>
          <label>
            <span class="axis-label">X축 회전</span>
            <output data-output-for="rotateX">0°</output>
            <input data-control="rotateX" type="range" min="-80" max="80" step="1" value="0" />
            <span class="tick-labels" aria-hidden="true"><span>-80</span><span>-60</span><span>-30</span><span>0</span><span>30</span><span>60</span><span>80</span></span>
          </label>
          <label>
            <span class="axis-label">Y축 회전</span>
            <output data-output-for="rotateY">0°</output>
            <input data-control="rotateY" type="range" min="-80" max="80" step="1" value="0" />
            <span class="tick-labels" aria-hidden="true"><span>-80</span><span>-60</span><span>-30</span><span>0</span><span>30</span><span>60</span><span>80</span></span>
          </label>
          <label>
            <span class="axis-label">Z축 회전</span>
            <output data-output-for="rotateZ">0°</output>
            <input data-control="rotateZ" type="range" min="-80" max="80" step="1" value="0" />
            <span class="tick-labels" aria-hidden="true"><span>-80</span><span>-60</span><span>-30</span><span>0</span><span>30</span><span>60</span><span>80</span></span>
          </label>
          <label>원근감 <input data-control="perspective" type="range" min="900" max="3200" value="1400" /></label>
          <label>크기 <input data-control="scale" type="range" min="35" max="95" value="56" /></label>
        </details>

        <details class="control-group" data-mobile-panel="shadow" data-mobile-active="false">
          <summary>그림자</summary>
          <button id="resetShadowButton" type="button" class="secondary slim section-reset">그림자 기본값</button>
          <label class="switch-field"><input data-control="shadowEnabled" type="checkbox" checked /><span class="switch"></span><span>그림자 표시</span></label>
          <label>강도 <input data-control="shadowAlpha" type="range" min="0" max="80" value="28" /></label>
          <label>흐림 <input data-control="shadowBlur" type="range" min="0" max="80" value="26" /></label>
          <label>X 이동 <input data-control="shadowX" type="range" min="-160" max="160" value="18" /></label>
          <label>Y 이동 <input data-control="shadowY" type="range" min="-160" max="220" value="24" /></label>
          <label>바닥 기울기 <input data-control="shadowSkew" type="range" min="-80" max="80" value="10" /></label>
        </details>

        <details class="control-group" data-mobile-panel="tail" data-mobile-active="false" open>
          <summary>말풍선 꼬리</summary>
          <button id="resetTailButton" type="button" class="secondary slim section-reset">말풍선 꼬리 기본값</button>
          <label class="switch-field tail-enable-first"
            ><input data-control="tailEnabled" type="checkbox" /><span class="switch"></span
            ><span>말풍선 꼬리 표시</span></label
          >
          <fieldset class="tail-side-picker">
            <legend>꼬리 위치</legend>
            <div class="tail-side-diagram" role="presentation">
              <div class="tail-rim" aria-hidden="true">
                <span class="tail-rim__edge tail-rim__edge--top"></span>
                <span class="tail-rim__edge tail-rim__edge--right"></span>
                <span class="tail-rim__edge tail-rim__edge--bottom"></span>
                <span class="tail-rim__edge tail-rim__edge--left"></span>
              </div>
              <label class="tail-hit tail-hit--top">
                <input data-control="tailSide" type="radio" name="tailSide" value="top" />
                <span class="tail-hit__label">위</span>
                <span class="tail-hit__knob" aria-hidden="true"></span>
              </label>
              <label class="tail-hit tail-hit--right">
                <input data-control="tailSide" type="radio" name="tailSide" value="right" />
                <span class="tail-hit__knob" aria-hidden="true"></span>
                <span class="tail-hit__label">오른쪽</span>
              </label>
              <label class="tail-hit tail-hit--bottom">
                <input data-control="tailSide" type="radio" name="tailSide" value="bottom" checked />
                <span class="tail-hit__knob" aria-hidden="true"></span>
                <span class="tail-hit__label">아래</span>
              </label>
              <label class="tail-hit tail-hit--left">
                <input data-control="tailSide" type="radio" name="tailSide" value="left" />
                <span class="tail-hit__label">왼쪽</span>
                <span class="tail-hit__knob" aria-hidden="true"></span>
              </label>
            </div>
          </fieldset>
          <label>위치 <input data-control="tailPosition" type="range" min="10" max="90" value="58" /></label>
          <label>너비 <input data-control="tailWidth" type="range" min="20" max="220" value="64" /></label>
          <label>길이 <input data-control="tailLength" type="range" min="20" max="260" value="118" /></label>
          <label>방향 <input data-control="tailLean" type="range" min="-180" max="180" value="86" /></label>
          <label class="tail-color-field">
            채우기
            <span class="tail-color-row">
              <input id="tailColor" data-control="tailColor" type="color" value="#ffffff" />
              <input
                id="tailColorHex"
                class="tail-color-hex"
                type="text"
                maxlength="7"
                spellcheck="false"
                autocomplete="off"
                aria-label="채우기 색 HEX"
              />
            </span>
          </label>
        </details>
      </section>
    </main>

    <div id="presetDialog" class="dialog-backdrop" role="presentation" hidden>
      <form class="preset-dialog modal-panel" role="dialog" aria-modal="true" aria-labelledby="presetDialogTitle">
        <h2 id="presetDialogTitle">현재 설정 저장</h2>
        <label>
          프리셋 이름
          <input id="presetNameInput" type="text" maxlength="40" autocomplete="off" required />
        </label>
        <p id="presetNameError" class="dialog-error" role="alert"></p>
        <div class="dialog-actions">
          <button id="cancelPresetSaveButton" type="button" class="secondary">취소</button>
          <button type="submit">저장</button>
        </div>
      </form>
    </div>

    <div id="resetConfirmDialog" class="dialog-backdrop" role="presentation" hidden>
      <div
        class="confirm-dialog modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="resetConfirmTitle"
        aria-describedby="resetConfirmHint"
      >
        <h2 id="resetConfirmTitle">설정을 초기화할까요?</h2>
        <p id="resetConfirmHint" class="confirm-dialog__hint">
          3D 회전, 그림자, 말풍선 꼬리 모양이 기본값으로 돌아갑니다. 말풍선 표시 ON/OFF는 그대로 유지됩니다. 올려둔 사진은
          바뀌지 않습니다.
        </p>
        <div class="dialog-actions">
          <button id="cancelResetButton" type="button" class="secondary">취소</button>
          <button id="confirmResetButton" type="button" class="danger">초기화</button>
        </div>
      </div>
    </div>

    <div class="mobile-action-bar" aria-label="빠른 작업">
      <button id="mobileDownloadButton" type="button">PNG 저장</button>
      <button id="mobileResetButton" type="button" class="secondary">설정 초기화</button>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite">
      <span class="toast__icon" aria-hidden="true"></span>
      <span class="toast__text"></span>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
